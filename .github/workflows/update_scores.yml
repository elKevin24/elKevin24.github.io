name: Update World Cup Scores

on:
  schedule:
    - cron: '*/10 * * * *' # Corre cada 10 minutos para polling adaptativo
  workflow_dispatch:      # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-scores:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.commit.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run update scripts
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_TYPE: ${{ vars.API_TYPE }}       # API_SPORTS o RAPID_API
          TEST_MODE: ${{ vars.TEST_MODE }}     # true para pruebas de simulación
        run: |
          # 1. Actualizar marcadores finales
          python update_scores.py
          
          # 2. Actualizar metadatos visuales (logos/estadios)
          python get_team_metadata.py
          
          # 3. Detectar partido en vivo para el dashboard
          python check_live_match.py

      - name: Commit and push changes
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Añadir todos los JSON actualizados
          git add partidos.json live_match.json metadata_equipos.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update: scores, live status & metadata [skip ci]"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-scores
    if: needs.update-scores.outputs.updated == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


